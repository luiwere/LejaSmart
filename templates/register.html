<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DigiLedger — Register</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">

  <div class="auth-card">

    <div class="logo">DigiLedger</div>

    <p class="tagline">Create your account to get started.</p>

    <form id="register-form">

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Your name" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>

      <div class="form-group">
        <label for="role">Register as</label>
        <select id="role" name="role">
          <option value="vendor">Vendor</option>
          <option value="accountant">Accountant</option>
          <option value="owner">Owner</option>
        </select>
      </div>

      <div class="form-group" id="shop-name-group">
        <label for="shop_name">Shop name</label>
        <input type="text" id="shop_name" name="shop_name" placeholder="Your shop name">
      </div>

      <div class="form-group hidden" id="shop-code-group">
        <label for="shop_code">Shop code</label>
        <input type="text" id="shop_code" name="shop_code" placeholder="Enter shop code">
      </div>

      <button type="submit" class="btn-primary">Create Account</button>

      <p class="auth-footer">
        Already have an account? <a href="/">Login</a>
      </p>

    </form>
    </div>

    <script>
    const roleSelect = document.getElementById('role');
    const shopNameGroup = document.getElementById('shop-name-group');
    const shopCodeGroup = document.getElementById('shop-code-group');

    function updateShopFields() {
      if (roleSelect.value === 'accountant') {
        shopNameGroup.classList.add('hidden');
        shopCodeGroup.classList.remove('hidden');
      } else if (roleSelect.value === 'vendor') {
        shopNameGroup.classList.remove('hidden');
        shopCodeGroup.classList.add('hidden');
      } else {
        shopNameGroup.classList.add('hidden');
        shopCodeGroup.classList.add('hidden');
      }
    }

    roleSelect.addEventListener('change', updateShopFields);
    updateShopFields();

    document.getElementById('register-form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const formData = new FormData();
    formData.append('username', document.getElementById('username').value);
    formData.append('email', document.getElementById('email').value);
    formData.append('password', document.getElementById('password').value);
    formData.append('role', roleSelect.value);
    formData.append('shop_name', document.getElementById('shop_name').value);
    formData.append('shop_code', document.getElementById('shop_code').value);

    if (roleSelect.value === 'vendor' && !document.getElementById('shop_name').value) {
      alert('Please enter a shop name.');
      return;
    }

    if (roleSelect.value === 'accountant' && !document.getElementById('shop_code').value) {
      alert('Please enter the shop code for your accountant account.');
      return;
    }

    const res = await fetch('/register', {
      method: 'POST',
      body: formData,
    });

    if (res.status === 409) {
      alert('Email already taken. Please use a different email.');
      return;
    }

    if (res.ok) {
      const data = await res.json();
      if (data.shop_code) {
        alert('Your shop code is: ' + data.shop_code + '\nShare this with your accountant.');
      }
      window.location.href = '/';
    } else {
      alert('Something went wrong. Please try again.');
    }
  });
  
  </script>
  
</body>
</html>
